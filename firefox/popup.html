<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CornerFriend</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <div class="logo-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div>
          <h1 class="logo-title">CornerFriend</h1>
          <p class="logo-sub">Cozy-Call v1.0</p>
        </div>
      </div>
      <div id="live-badge" class="live-badge hidden">
        <span class="live-dot"></span>
        <span>Live</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">

      <!-- Summon Section -->
      <section class="card" id="summon-section">
        <div class="card-header">
          <div class="section-icon" id="section-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <h3 class="card-title">Summon a Buddy</h3>
        </div>

        <!-- URL Input -->
        <div class="url-row">
          <div class="url-input-wrap">
            <svg class="url-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
            </svg>
            <input id="url-input" class="url-input" type="text" placeholder="Paste YouTube Video URL..." />
          </div>
          <button id="add-btn" class="btn btn-primary btn-sm" disabled>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add
          </button>
        </div>

        <p id="url-error" class="error-text hidden"></p>

        <!-- Buddy Name -->
        <div class="name-row">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="muted-icon">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <input id="buddy-name" class="name-input" type="text" value="Buddy" placeholder="Name your buddy..." />
        </div>

        <!-- Queue -->
        <div id="queue-container" class="hidden">
          <p class="queue-label">Queue (<span id="queue-count">0</span>)</p>
          <div id="queue-list" class="queue-list"></div>
        </div>

        <!-- Error state -->
        <div id="empty-error" class="error-text hidden">Add at least one YouTube URL first</div>

        <!-- Start Call Button -->
        <button id="start-call-btn" class="btn btn-green w-full hidden">
          <span class="live-dot-sm"></span>
          <span id="start-call-label">Call Buddy</span>
        </button>

        <!-- End Call Button -->
        <button id="end-call-btn" class="btn btn-red w-full hidden">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7 2 2 0 012 1.94V19a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.42 19.42 0 013.07 8.81 2 2 0 015 6.63h3.51a2 2 0 011.94 1.7 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L9.43 14.4"/>
            <line x1="23" y1="1" x2="1" y2="23"/>
          </svg>
          End Call
        </button>
      </section>


      <!-- Favorites -->
      <section class="card" id="favorites-section">
        <div class="fav-header">
          <div class="card-header" style="margin-bottom:0">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
            <h3 class="card-title">Favorite Buddies</h3>
          </div>
          <button id="save-btn" class="btn btn-ghost btn-xs hidden">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Save
          </button>
        </div>

        <!-- Save Form -->
        <div id="save-form" class="save-form hidden">
          <input id="save-name-input" class="name-input" type="text" placeholder="Name this setup..." />
          <button id="save-confirm-btn" class="btn btn-primary btn-xs">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
            Save
          </button>
        </div>

        <!-- Favorites Grid -->
        <div id="favorites-grid"></div>
      </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>CornerFriend v1.0 &bull; Made with 💜</span>
    </footer>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
